name: Keep Supabase Alive

on:
  schedule:
    # Runs every 5 minutes to prevent Supabase idle sleep
    - cron: "*/5 * * * *"
  
  # Also allows you to trigger this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Backend Endpoint
        # Replace the URL below with your actual deployed Netlify function URL.
        # Hitting 'ping' forces the backend to talk to Supabase lightly without auth errors.
        run: |
          curl -s "https://your-website.com/.netlify/functions/ping" > /dev/null
          echo "Ping successful!"
